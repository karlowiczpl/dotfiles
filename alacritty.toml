[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "Return"
mods = "Super|Shift"

[colors.primary]
foreground = "#f8f8f2"
background = "#282a36"

[colors.cursor]
text = "#282a36"
cursor = "#f8f8f2"

[colors.selection]
text = "#f8f8f2"
background = "#44475a"

[colors.normal]
black = "#21222c"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#bd93f9"
magenta = "#ff79c6"
cyan = "#8be9fd"
white = "#f8f8f2"

[colors.bright]
black = "#6272a4"
red = "#ff6e6e"
green = "#69ff94"
yellow = "#ffffa5"
blue = "#d6acff"
magenta = "#ff92df"
cyan = "#a4ffff"
white = "#ffffff"

[cursor.style]
shape = "Block"
blinking = "Off"

[font]
size = 14.0

[font.bold]
family = "0xProto Nerd Font"
style = "Bold"

[font.bold_italic]
family = "0xProto Nerd Font"
style = "BoldItalic"

[font.italic]
family = "0xProto Nerd Font"
style = "MediumItalic"

[font.normal]
family = "0xProto Nerd Font"
style = "Medium"

[selection]
save_to_clipboard = false

[terminal.shell]
program = "/usr/bin/fish"

[window.class]
general = "Alacritty"
instance = "Alacritty"

[window]
opacity = 1
startup_mode = "Fullscreen"

[window.padding]
x = 0
y = 0

[general]
live_config_reload = true
